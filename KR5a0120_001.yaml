front:
  text: 陰符經三皇玉訣卷上黃帝問曰陰符者何也廣成子曰此陰符二
  hash: sha256:cc945af96c8c99212ff2ff7809883f68d40602c13b13966b88c4c879a2e614ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_001-001a, image: hfl/0057/0057-012.png}
body:
  text: 字上可通天下可察地中可化生萬物為人最尊陰者暗也符者合也古之聖人內動之機可以明天地造化之根至道推移之源性命之本生死之機知者可究合天地之機操運長生之體故曰陰符也黃帝曰上有神仙抱一之道者何也天真皇人曰夫神仙抱一之道者上天所祕世人不可得之神仙抱一者乃是太一含真之氣太一者乃是北極太淵之源乃虛無煉神之道上天所祕世人不可得知子在人間安曉此語一者天氣也人將太一真氣與我真氣相濟更要知天時受天氣接人氣人氣接天氣與天氣相接而不死也人若包含太和真氣久而煉之乃為大丹純陽也陽者天道故神氣合道乃為神仙抱一之道也黃帝曰中有富國安民者何也廣成子曰富國安民者乃煉氣之道也凡人將真精煉成神胎名曰胎仙故聚而成形散而成氣故與道相通道者養氣養氣者保神合於大道故曰真氣相濟久而用火煅煉成丹若能全精氣煉作純陽故乃成丹換形萬神皆安國中有寶故曰富國安民也黃帝曰下有強兵戰勝者何也天真皇人曰強兵戰勝者乃真氣戰退陰氣也煉體純陽金筋玉骨鶴體松形謂之純陽故得不死以身為國以心為君以精為民以形為爐首者鼎也精滿於腦故用火煅煉成丹因精體見火火者陽氣息者風也以風吹火久煉形神俱妙故曰煉神之道存心於內真氣自然沖和不死故曰煉百關精髓純陽也九竅氣定下關精氣不泄者勝也黃帝曰天皇者何也廣成子曰天皇者先天之前五劫開化混沌之始也天皇一氣聖化萬象主天聖玉虛聖境明皇之祖氣也黃帝曰地皇者何也天真皇人曰地皇者天皇一氣下降於地地氣受之二氣相合主生化金光之氣乃是洞神真境真皇之祖氣也黃帝曰人皇者何也廣成子曰人皇者在天地之間虛無至理為天皇一氣地皇一氣太空虛中相合化金木五星為中宫合乾坤八卦保護化神乃仙境主中元人皇之祖氣也黃帝曰觀天之道執天之行盡矣何也天真皇人曰觀天者乃丹陽之氣純陽之物精氣運而不絶升沉往還周時復始包含萬象乃青陽之氣天地者陰陽之精天氣下降地氣復升升而復降人在其中而不知其理天之陽精為曰地之陰精為月曰月運而不休寒暑煎而無息凡人不知身內亦有天地之氣天氣升降有時人知者觀天之道執天之行盡矣黃帝曰何謂不知廣成子曰頭以象天清陽之本足以象地濁陰之源人能內含天地之道與天地齊年人身中有真陽之氣藏於陰精之內精氣者真氣之母真氣者精氣之子常將子母相守故不死復歸其源為人不知時日天樞之上天元一氣主之天樞之下地元一氣主之天樞之中陰陽真源主之人用天時混元正一之氣上下無窮與天地齊年乃觀天之道執天之行盡矣黃帝曰人用者何也天真皇人曰聖人存精養氣以保形神人不知者貪欲亡精用心失神勞形散氣更不能使其神氣合道不知天地之升沉日月之運轉故死也以其分受日月之氣若能觀此天地與我同耳為人不知天地之理陰陽之旨若合天地之體則至矣此乃人之用也黃帝曰天有五賊見之者昌何也廣成子曰天受一氣內含五星之正氣而稟清濁之源地受一氣故生二儀復升於天造化以成三元布列四時中有五氣推運共成五行五賊者則五行之正氣也人能賊天地之氣奪陰陽之造化混三元之返覆復四門之往來一氣皆同故成道也乃五賊也黃帝曰天有五賊如何用也天真皇人曰五賊者是五氣也長養萬物生殺之機權造化之本始天以五氣聚而成形散而為風子能知道之源者藏於身中分而滿於體內精氣與天氣相濟久而煉成丹是五行之正氣也天氣下降地氣受之而不相離人在其中五氣之內若能賊之故不死也吾今二十萬二千歲矣皆因知五賊造化返復之理也吾今傳受五賊之理子與吾皆同子若不知五賊之理故有死矣若能從吾之言賊天地五星之氣則不死也乃五賊之理也黃帝曰五賊在心施行於天何也廣成子曰人身中亦有五行之正氣五行正氣者五臟之氣也五臟之氣者五賊也水得其一者人腎屬於水未生之前道為之本先生左腎象北方大淵之源造化之本為青陽之氣號曰青龍屬木次生右腎屬金內有真精主五行之正氣號曰白虎乃是白元君一氣二腎內生白脈二條上湧朝元通靈陽之宫復降下通於巽坤中有五氣聚四時合於乾艮出天甲入戊己之內乃道生神之始人按天時相接天地之氣頭圓象天足方象地中理五氣聚而入於絳宫達於筋骨升而朝於鼎內復降湧泉入於中黃之宫混合萬神故青陽至首群陰皆散更用五行正氣內濟共一鼎煉成丹故不死矣乃施行於天也黃帝曰宇宙在乎手何也天真皇人曰宇宙者天地也陰陽萬物之本受陰陽而成形陰者地氣陽者天氣天氣下降地氣受之地氣上騰天氣接之天氣地氣相交陰陽感契萬神生化成象上古聖人把握天地陰陽造化之元機機者在於用知者得而守也守者道也而不死也故曰宇宙在乎手也黃帝曰宇宙在乎手者如何用也廣成子曰天地交合宇宙不散內造化生神立陰陽神機則成大道大道者無為也無為則命不亂命不亂則神不移神不移則精不散精不散則氣不絶更以道氣通行而固身若運於精火相隨煅煉成金丹者乃自然也吾知宇宙之機運而連連行之合於天地之作勿令放也久而神自朝元故不死矣乃宇宙在乎手者也黃帝曰萬化生乎身者何謂也天真皇人曰萬化者神也精不散而神不離神室者萬神聚會之鄉在崑崙之中五氣聚於內人能將真精氣結成神胎朝於鼎上故曰至聖萬神皆聚而為一凡人移精失氣而不能保神是不知生身之法生身之法陰陽之道故曰萬化生乎身也黃帝曰何者生身之法也廣成子曰從一氣所生而不知一氣之造化一生二二生三三生萬物人受一氣化成三氣神氣精此乃生身之法也黃帝曰一者何也天真皇人曰一者天地之根陰陽之祖萬物之首乃生神也子能知真一之氣而萬物自生則不死故曰一也黃帝曰天性人也人心機也何也廣成子曰天以斗運為機人以心為機心者神也神機合道乃鬼神不測人未生之時先受一氣為命然後父母二氣相合故乃成形胎元生神故為性之源人能澄心如天地動機故同天地乃因性靜心機合道故曰天性人也人心機也黃帝曰人心機者如何用也天真皇人曰人心者機本也人能存心守神而不忘機用心者百神之元也安心者養性也是以聖人安其心而抱元含真含真者安性也以心為性以氣為命氣絶則命亡皆亂於性也失其氣故死矣若人如天氣澄清故不失於性也性不失則氣不散氣不散則命不亡命不亡則形不滅也天地者性命之本也故曰天性人也人心機也黃帝曰立天之道以定人也何也廣成子曰天道者清陽之氣也故以純陽為本人能含造化純陽之體如天地之陽而不棄也人受一正之氣體養萬神純陽之理故曰立天之道以定人也黃帝曰立天之道如何用也天真皇人曰天道者人之本也父母者人之始也人能留形於本而不失於始調神合道故曰立天之道也黃帝曰如何留形不失於始也廣成子曰人不憂愁思慮而不失其本去疾病勞苦而不失於始也失其本者自亡其命失其始者形還下土若人能心靜無欲而存神氣不失其始者知理也黃帝曰天發殺機移星易宿何也廣成子曰天之母者太易內藏陰陽二氣日月也日月未分聖化生神神名太一之首日月又分為陰陽陰陽分其五太五太者五帝五帝又分八卦八卦朝於中聖化為九宫乃是太一之神宫立其五斗內有中斗日月星奇北斗受機斡運陰陽陰為機者死陽為機者生陰陽合機為之道太一將生殺之機周遊八卦移星易宿返陰為陽乃長生返陽為陰殺者死也天之四時造化八卦循環人身中亦有為人不知為陰而殺乃死展轉輪回失其人身人能致修者道也故曰天發殺機移星易宿也黃帝曰何謂不失人身殺機不死者何也天真皇人曰太一鎮在九宫出入有時召太陽君回入陽殿四時移換八卦朝元萬神都聚殺陰返陽排列星辰歸其金闕之內聖境太清正陽白元君也若人知此天發殺機能將太一真氣隨機應化返八卦純陽復歸乾坤之祖氣使合混沌九天生神之章乃為天道永得長生依此造化為真人也故曰天發殺機移星易宿也黃帝曰地發殺機龍蛇起陸何也廣成子曰沖和一氣發者動也故天運不絶殺機者變化也龍者天氣也風也蛇者地氣也火也人能運精氣上下往來奪之造化故玄機若去六欲動於機權如天地之體人在其中有真陽之精氣名曰蛇上通天元之氣呼吸而上下相應地動之機起而離陸故曰地發殺機龍蛇起陸也黃帝曰人身中知何用天真皇人曰臍下一寸三分者氣海也中有真精一合按於地土中有二經通於腦腦中有府名靈陽之府有二左曰太極之右曰沖靈之上通天氣下至海源故曰呼吸天氣下降地氣上騰二氣相接則養真精名曰龍青陽之本下者為蛇則元氣也二氣相交成藥久煉成丹故不死也乃陽神超於身外乃人身中地發殺機龍蛇起陸也黃帝曰人發殺機天地返覆何也廣成子曰人發殺機者去六欲七情靜則靜於情意動則動於神機內用神氣上下相合守於神者陽氣也頭圓象天足方象地天地返覆乃陰陽升降人之返覆呼吸徹於蒂耳一吸天氣下降一呼地氣上升吸者天氣呼者地氣我之真氣相接也人能下運地氣至天上故曰人發殺機天地返覆也黃帝曰天人合發萬變定基何也天真皇人曰天生萬物人為萬生一物之首也故天地相合而長養萬物人能用精氣相合而萬神皆喜天地故不棄而相逐神在其中神者乃天道也而好清若濁而神散不合天道上古聖人固精養神存氣養精合於天道乃為真人天有一氣地有二儀中有三光四時共備五行相列六合相生七政為機八卦乃同九宫布滿天地五斗璇璣人亦有之人能受天地一氣相和諸神配合兩儀大丹乃成一氣上下無窮四時中有一氣播於中土五行顛倒內六陽上朝金闕七真常居體內八卦共起元宫三光混混白雪飄飄七政功成黃芽內長九宫貫串萬象乃合天道故曰天人合發萬變定基也黃帝曰性有巧拙可以伏藏何也廣成子曰天性不可亂神氣若亂故不知所以神伏藏者性如朗月自然通道巧者內使天機外事不可入故伏智藏神也乃同天道拙者為人不知自有神氣合道縱心信意生情一任散失神氣不明天地造化亂認陰陽故有死也乃性有巧拙也黃帝曰性有巧拙如何伏藏用也天真皇人曰性者神也不可動也故神定氣和元氣自降伏者不貪嗜慕欲藏者藏於神光氣入絳宫萬神聚會之鄉伏藏而不動萬神不散故曰伏藏神定造化久煉成道乃性巧不拙也黃帝曰九竅之邪在乎三要可以動靜何也廣成子曰九竅者心有九竅內藏九氣上者三清之氣中者三皇之氣下者本元之氣乃精氣神也出入有時混而為一外通耳目口鼻陰中也三要者神氣與精相合玄化玉户上通於天下通於地中通三皇之祖氣乃三要之道也動靜耳目口鼻也目觀則心動耳聽則神移曰談則氣散鼻馥則精髓化為陰濁之水若故令靜而不動則心中二竅左曰玄右曰牝下入氣海上通泥丸此真氣相通故使神氣動機玉户自閉穿脊腠過三關而朝北極陽宫動而保養真神上古聖人云動則動於神機靜則靜於心意精氣神是三要也故曰九竅之邪在乎三要也黃帝曰火生於木禍發必尅何也天真皇人曰木去其火則不灰人去其惡性則不死木中有火火發必焚其真氣乃成煙焰即上升而歸天火煅木為灰爐而歸土凡人性惡為火火出則神散神散則氣離氣離則身死真陽之氣歸於天濁陰之質歸於土謂火從木生即以水救之即不灰人起火性以柔而救之即身不壞人之火發而萬神皆散故死也人能制火禍不能尅乃成大道故曰火生於木禍發必尅也黃帝曰姦生於國時動必潰何也廣成子曰國中有姦久而破國身中有邪久而亡身國去其姦則邦寧人去其情即身安去姦者六欲七情三尸也人能制姦邪者成其大道也故曰姦生於國時動必潰也黃帝曰如何得安身也天真皇人曰萬物盜太虛真氣人腹中有蠱盜萬物之氣而名虹蠱虹蠱者化為佞蟲佞蟲者賊我之魂魄亡我之神氣散我之精血死我之形也人能知陰陽造化起真火煉陰邪之姦故殺虹蟲不令為害故得身安返成大道也黃帝曰知之修煉謂之聖人何也廣成子曰上古聖人用神機測天地陰陽升降有時要知火候之數下火依時戊己宫內本始生神之母也知者復歸其母勿令放失更受天氣為青陽之首合地氣真陰之母我之神氣精在其中五氣皆全心靜無欲用火煅煉煉成純陽造化成道魄返陽魂情陰盡滅松形玉骨百關無漏上達於天界乃為真人也故曰知之修煉謂之聖人也陰符經三皇玉訣卷上
