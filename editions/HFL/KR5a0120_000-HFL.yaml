front:
  text: 陰符經三皇玉訣序餘一
  hash: sha256:5ba902941f81a6218610a19d270f91a0b1c1e7df68e9652436b1039b9f29e1b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_000-001a, image: hfl/0057/0057-004.png}
body:
  text: 軒轅黄帝製朕詔文武百官同理國事有護國岐師出班奏表有奇怪鳥獸銅頭鐵額坐高三丈兩翅如刀飛騰遮蔽日月皆昏在地吞石颺沙江河枯乾又傷害人民性命甚多天下無治遂詔文武百官車駕親出觀天下人民痛傷視見蚩尤果有怪鳥難治朕前去至一大山夜見紅光紫霧白氣青霞圍繞不散再詔文武盡視皆見岐師奏言此山有名虚天壇第一洞天上臨玉清元始之宫朕親駕到山有一石洞不知深淺差勇猛壯士名重山身長三丈五尺使入洞内用燭火前去經三曰三夜方出重山奏言中有大石匣金甲神人八員守定各執斧鉞仗劍喝云不得到此重山奏畢朕發心燒香上奏三清願臣有分開取石匣不避凶吉要知天地秘密天機之事焚香告禮三清朕遂同入洞亦有紅光遶定不見金甲神人朕於石匣見一巷經號曰元始天尊混元三皇玉訣陰符經即將經出洞焚香拜禮上謝三清開看見字不常盡是天文篆書三百餘字分爲三巷上卷天皇中巷地皇下巷人皇上卷按神仙抱一之道中卷按富國安民之法下巷按强兵戰勝之術與天地陰陽萬物爲祖宗治國齊家持身不死之道皆從此經乃青陽秀炁自然結成文每字方圓一丈朕復回皇都再集文武百官議此經事之理盡言不知此義理不曾聞此經出處朕遂行宣文天下名山洞府恐有玄妙高士並世賢人深曉經義之事曾收此經者便許奏呈解義如通此陰符經義者朕賞金賜命天下盡無此經豈通道理朕遍訪名山洞府修道之士盡拜爲師求長生之路要解此經之義絶無人知義理盡是旁門小法自此四十餘年入道身衰皓髮如銀道也難成朕聞崆峒山有一高聖先生廣成子妙道深玄朕車駕親詣自心屈弱膝行肘步禮拜侍立告求廣成子先生指教臣自石室中得陰符經一卷不曉義理在世盡不通曉此經今遇先生感天不忘要通此經之妙道廣成子先生言此經者是上天所秘在世洞天隱此經一卷鎮天下妖魔龍神精怪當與世上有德行之人遇此經者修長生之路復升天道永世流傳天下信道有縁之人此經要知義理天下莫能知見今峨嵋山有一高聖天眞皇人深曉此經義理廣成子同去侍見天眞皇人朕問此陰符經天皇地皇人皇陰陽造化治國治家治身長生不死復升於天界如何修道朕聞高聖廣成子先生說高聖天眞皇人答朕當時深曉陰陽造化成道之理朕道成升天之日恐後人信道修眞者憑何經文朕乃留此經徧行於世復隱此經一卷於崆峒山又留九宫入卦分陰陽五行奪造化動天機入室登壇九宫局式璇璣立斗時分候節氣金木生殺擇眞至寶取時造化内煉輕清化神純陽之體返金靈之虎變赫火龍虚騰炎天之上入聖朝元之道集成文序又分造化陰陽日月爲象天地爲父母八卦爲子孫太一行乾坎艮震巽離坤兊天發殺機移星易宿九宫之圖如後人獲遇此經者不得輕泄不信之人若傳下愚之人者墮九玄七祖入輪迴永不得出期後殃及子孫也
