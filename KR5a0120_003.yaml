front:
  text: 陰符經三皇玉訣卷下黃帝曰絶利一源用師十倍何也天真皇人
  hash: sha256:d8b2f85a1ae5c26ebc9f7c0e8d09b9dbaebebd2e9e40d152ebb584c86486e55f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_003-001a, image: hfl/0057/0057-054.png}
body:
  text: 曰絶名棄利元氣自守絶巧棄智盜賊無有絶於聲色更用元氣抱一守中勝貴人十倍太上用大道至於天下為聖師藏火於中源久而不動動而自然合於大道焉用智巧故離其欲而勝師十倍故曰絶利一源用師十倍也黃帝曰三返畫夜用師萬倍何也廣成子曰三返者三元也天元真氣居首靈源真氣居中本源真氣居下是以精氣者師也心者君也形者爐也用精曰夜遇三元上下無窮而用之兼倍精神元氣不散形體不衰而通於晝夜晝則日用而明陽得夜氣內動陰氣於外陽氣者精神之本也陰氣者敗我之形也若能精神遇三元之祖氣上下混而為一如師使之萬神俱其一化其神晝夜不停陰魄俱消三陽獨居於內久而神自朝元故不死也故曰三返晝夜用師萬倍也黃帝曰心生於物而死於物何也天真皇人曰用心者意動也意動則神移神移則氣散氣散則命亡故死也心正者是神定也制者則心正一氣之源內動之機萬化皆通心亂則萬神皆廢故去情意則萬神不失於物也故曰心生於物而死於物也黃帝曰機在目何也廣成子曰道之遠者在八化之外近在眉睫之間大則包含天地細則貫串眉毛神機內動目睫飛鉛故神機在目為其間有神室內動之機在目而明也非常景通道見陰邪自滅真境返正見陽神於天道故曰機在目也黃帝曰天之無恩而大恩生何也天真皇人曰以天道而化下方萬物自然生乃大恩生也不可以色欲縱其心而使其意亂則邪恩生故有死也安其心以保其神自然流通豈不知烏不染而自黑鶴不浴而自白蛛不教而成網燕不招而自來如此自然恩生故曰天之無恩而大恩生也黃帝曰迅雷烈風莫不蠢然何也廣成子曰迅速如雷霆陰陽正氣也人能食風氣用陰陽之氣上下精氣蠢然而已行道運動陰陽神氣內交真精上移而入於腦中復降迅速如風雷三元布滿而百骸火飛鍊陰而返純陽是以聖人速了道也內修真體自妙如瑞草受陰陽沖和之氣故不死莫不蠢然也黃帝曰至樂性餘至靜則廉何也天真皇人曰至樂於神者陰陽之本也至者定也定於心意陰陽自合至靜則廉也目不觀於色而神不移其氣內保自然至樂於天真也去其欲靜其心定其意守其神抱一至靜而入新換舊乃達於道聖人致性命合於天道志剛則廉也故曰至樂性餘至靜則廉也黃帝曰天之至私用之至公何也廣成子曰天乃清陽之氣至私者暗發也則生於萬物人在其中復正神也若能收藏元氣補養天真更能善用其功而成道也謂之至公精氣固身知者依時運用上入泥丸下入海源會於中宫以接元氣度元關朝金闕三田相灌百節俱通周身火發久而鍊之得成仙矣故曰天之至私用之至公也黃帝曰禽者制在氣何也天真皇人曰禽者烏也烏者心氣也故飛騰而有時氣者虛無之發人能致其氣久鍊為仙也禽者南方火也人能致其道使真氣久而如禽飛在太空人能擒收在中元鍊成正陽乃得為飛仙矣故曰禽者制在氣也黃帝曰生者死之根死者生之根何也廣成子曰生巧者死於命人能定心除六欲七情者神定道生也若心生欲情性巧者神散命亡死之根本也心死永得復生乃生死之根也黃帝曰恩生於害害生於恩何也天真皇人曰聖人恩生於道凡人恩生於情亡其身害其命也損有其餘而補不足有餘者心有情欲補不足也精神散也縱心起欲色是恩中生害而亡其神也若能澄心不倦其神自明是害中生恩苦志修心而不亂則害忘也保其神也故乃成道和快於心滅於歡樂而保精神忘情無欲至此為聖人也故曰恩生於害害生於恩也黃帝曰愚人以天地文理聖我以時物文理哲何也廣成子曰凡人知有天地文理言聖人外像不知我自有天地陰陽我藏也陰陽者鬼神不測之法也天地通大小幽冥之理愚人所作不知我與天地陰陽時物皆同耳天地之理聖人之機也至道之苗萬物之本陰陽之宗故變化無窮乃至於道至精我之有也道之自然萬物有物我為哲也陰陽之非勝奈我同而勝也勝者我之神也神者至道之源也故我靈而陰陽同聖天地也二氣結而萬物皆同神氣超時聖於大道也吾曉大道包含天地明哲盡矣旨真之理我自然聖化三清也黃帝稽首再拜謝聖君指教愚昧臣方曉大道聖君遂駕雲鶴升空而去黃帝回輦而還都矣陰符經三皇玉訣卷下
