front:
  text: 陰符經三皇玉訣卷下黄帝曰絶利一源用師十倍何也天眞皇人
  hash: sha256:ec8a27bd5b5e1caaa79ddc67263543269aa4eca5f088e9ed0742a556813cb209
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_003-001a, image: hfl/0057/0057-054.png}
body:
  text: 曰絶名弃利元炁自守絶巧棄智盗賊無有絶於聲色更用元炁抱一守中勝貴人十倍太上用大道至於天下爲聖師藏火於中源乆而不動動而自然合於大道焉用智巧故離其慾而勝師十倍故曰絶利一源用師十倍也黄帝曰三返畫夜用師萬倍何也廣成子曰三返者三元也天元眞炁居首靈源眞炁居中本源眞炁居下是以精氣者師也心者君也形者鑪也用精曰夜遇三元上下無窮而用之兼倍精神元炁不散形體不衰而通於晝夜晝則日用而明陽得夜炁内動陰炁於外陽炁者精神之本也陰炁者敗我之形也若能精神遇三元之祖炁上下混而爲一如師使之萬神俱其一化其神晝夜不停陰魄俱消三陽獨居於内久而神自朝元故不死也故曰三返晝夜用師萬倍也黄帝曰心生於物而死於物何也天眞皇人曰用心者意動也意動則神移神移則氣散氣散則命亡故死也心正者是神定也制者則心正一炁之源内動之機萬化皆通心亂則萬神皆廢故去情意則萬神不失於物也故曰心生於物而死於物也黄帝曰機在目何也廣成子曰道之遠者在八化之外近在眉睫之間大則包含天地細則貫串眉毛神機内動目睫飛鉛故神機在目爲其間有神室内動之機在目而明也非常景通道見陰邪自滅眞境返正見陽神於天道故曰機在目也黄帝曰天之無恩而大恩生何也天眞皇人曰以天道而化下方萬物自然生乃大恩生也不可以色慾縱其心而使其意亂則邪恩生故有死也安其心以保其神自然流通豈不知烏不染而自黑鶴不浴而自白蛛不教而成網燕不招而自來如此自然恩生故曰天之無恩而大恩生也黄帝曰迅雷烈風莫不蠢然何也廣成子曰迅速如雷霆陰陽正氣也人能食風氣用陰陽之氣上下精氣蠢然而已行道運動陰陽神氣内交眞精上移而入於腦中復降迅速如風雷三元布滿而百骸火飛鍊陰而返純陽是以聖人速了道也内修眞體自妙如瑞草受陰陽冲和之氣故不死莫不蠢然也黄帝曰至樂性餘至靜則廉何也天眞皇人曰至樂於神者陰陽之本也至者定也定於心意陰陽自合至靜則廉也目不觀於色而神不移其炁内保自然至樂於天眞也去其慾靜其心定其意守其神抱一至靜而入新換舊乃達於道聖人致性命合於天道志剛則廉也故曰至樂性餘至靜則廉也黄帝曰天之至私用之至公何也廣成子曰天乃清陽之氣至私者暗發也則生於萬物人在其中復正神也若能收藏元氣補養天眞更能善用其功而成道也謂之至公精氣固身知者依時運用上入泥丸下入海源會於中宫以接元氣度元關朝金闕三田相灌百節俱通周身火發乆而鍊之得成仙矣故曰天之至私用之至公也黄帝曰禽者制在氣何也天眞皇人曰禽者烏也烏者心氣也故飛騰而有時氣者虚無之發人能致其氣乆鍊爲仙也禽者南方火也人能致其道使眞氣乆而如禽飛在太空人能擒收在中元鍊成正陽乃得爲飛仙矣故曰禽者制在氣也黄帝曰生者死之根死者生之根何也廣成子曰生巧者死於命人能定心除六慾七情者神定道生也若心生慾情性巧者神散命亡死之根本也心死永得復生乃生死之根也黄帝曰恩生於害害生於恩何也天眞皇人曰聖人恩生於道凡人恩生於情亡其身害其命也損有其餘而補不足有餘者心有情慾補不足也精神散也縱心起慾色是恩中生害而亡其神也若能澄心不倦其神自明是害中生恩苦志修心而不亂則害忘也保其神也故乃成道和快於心滅於歡樂而保精神忘情無慾至此爲聖人也故曰恩生於害害生於恩也黄帝曰愚人以天地文理聖我以時物文理哲何也廣成子曰凡人知有天地文理言聖人外像不知我自有天地陰陽我藏也陰陽者鬼神不測之法也天地通大小幽冥之理愚人所作不知我與天地陰陽時物皆同耳天地之理聖人之機也至道之苗萬物之本陰陽之宗故變化無窮乃至於道至精我之有也道之自然萬物有物我爲哲也陰陽之非勝柰我同而勝也勝者我之神也神者至道之源也故我靈而陰陽同聖天地也二炁結而萬物皆同神炁超時聖於大道也吾曉大道包含天地明哲盡矣㫖眞之理我自然聖化三清也黄帝稽首再拜謝聖君指教愚昧臣方曉大道聖君遂駕雲鶴升空而去黄帝回輦而還都矣陰符經三皇玉訣卷下
