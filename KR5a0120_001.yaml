front:
  text: 陰符經三皇玉訣卷上黄帝問曰陰符者何也廣成子曰此陰符二
  hash: sha256:6bc1836ac7a948f6cd7635a953b73d2bbbf6813304cb55a2d3e1ac4bd4bcfe5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_001-001a, image: hfl/0057/0057-012.png}
body:
  text: 字上可通天下可察地中可化生萬物爲人最尊陰者暗也符者合也古之聖人内動之機可以明天地造化之根至道推移之源性命之本生死之機知者可究合天地之機操運長生之體故曰陰符也黄帝曰上有神仙抱一之道者何也天眞皇人曰夫神仙抱一之道者上天所秘世人不可得之神仙抱一者乃是太一含眞之炁太一者乃是北極太淵之源乃虚無煉神之道上天所秘世人不可得知子在人間安曉此語一者天炁也人將太一眞炁與我眞炁相濟更要知天時受天氣接人氣人氣接天氣與天氣相接而不死也人若包含太和眞炁乆而煉之乃爲大丹純陽也陽者天道故神炁合道乃爲神仙抱一之道也黄帝曰中有富國安民者何也廣成子曰富國安民者乃煉炁之道也凡人將眞精煉成神胎名曰胎仙故聚而成形散而成炁故與道相通道者養炁養炁者保神合於大道故曰眞炁相濟乆而用火煅煉成丹若能全精炁煉作純陽故乃成丹換形萬神皆安國中有寶故曰富國安民也黄帝曰下有强兵戰勝者何也天眞皇人曰强兵戰勝者乃眞炁戰退陰氣也煉體純陽金筋玉骨鶴體松形謂之純陽故得不死以身爲國以心爲君以精爲民以形爲爐首者鼎也精滿於腦故用火煅煉成丹因精體見火火者陽炁息者風也以風吹火乆煉形神俱妙故曰煉神之道存心於内眞炁自然冲和不死故曰煉百關精髓純陽也九竅炁定下關精炁不泄者勝也黄帝曰天皇者何也廣成子曰天皇者先天之前五劫開化混沌之始也天皇一炁聖化萬象主天聖玉虚聖境明皇之祖炁也黄帝曰地皇者何也天眞皇人曰地皇者天皇一炁下降於地地炁受之二炁相合主生化金光之炁乃是洞神眞境眞皇之祖炁也黄帝曰人皇者何也廣成子曰人皇者在天地之間虚無至理爲天皇一炁地皇一炁太空虚中相合化金木五星爲中宫合乾坤八卦保護化神乃仙境主中元人皇之祖炁也黄帝曰觀天之道執天之行盡矣何也天眞皇人曰觀天者乃丹陽之炁純陽之物精氣運而不絶昇沉往還周時復始包含萬象乃青陽之炁天地者陰陽之精天氣下降地氣復昇昇而復降人在其中而不知其理天之陽精爲曰地之陰精爲月曰月運而不休寒暑煎而無息凡人不知身内亦有天地之炁天氣升降有時人知者觀天之道執天之行盡矣黄帝曰何謂不知廣成子曰頭以象天清陽之本足以象地濁陰之源人能内含天地之道與天地齊年人身中有眞陽之炁藏於陰精之内精炁者眞炁之母眞炁者精炁之子常將子母相守故不死復歸其源爲人不知時日天樞之上天元一炁主之天樞之下地元一炁主之天樞之中陰陽眞源主之人用天時混元正一之炁上下無窮與天地齊年乃觀天之道執天之行盡矣黄帝曰人用者何也天眞皇人曰聖人存精養氣以保形神人不知者貪慾亡精用心失神勞形散氣更不能使其神氣合道不知天地之升沉日月之運轉故死也以其分受日月之炁若能觀此天地與我同耳爲人不知天地之理陰陽之㫖若合天地之體則至矣此乃人之用也黄帝曰天有五賊見之者昌何也廣成子曰天受一炁内含五星之正炁而禀清濁之源地受一炁故生二儀復升於天造化以成三元布列四時中有五炁推運共成五行五賊者則五行之正炁也人能賊天地之炁奪陰陽之造化混三元之返覆復四門之往來一炁皆同故成道也乃五賊也黄帝曰天有五賊如何用也天眞皇人曰五賊者是五炁也長養萬物生殺之機權造化之本始天以五炁聚而成形散而爲風子能知道之源者藏於身中分而滿於體内精氣與天炁相濟乆而煉成丹是五行之正炁也天炁下降地炁受之而不相離人在其中五炁之内若能賊之故不死也吾今二十萬二千歲矣皆因知五賊造化返復之理也吾今傳受五賊之理子與吾皆同子若不知五賊之理故有死矣若能從吾之言賊天地五星之炁則不死也乃五賊之理也黄帝曰五賊在心施行於天何也廣成子曰人身中亦有五行之正炁五行正炁者五臟之氣也五臟之氣者五賊也水得其一者人腎屬於水未生之前道爲之本先生左腎象北方大淵之源造化之本爲青陽之炁號曰青龍屬木次生右腎屬金内有眞精主五行之正炁號曰白虎乃是白元君一炁二腎内生白脉二條上湧朝元通靈陽之宫復降下通於巽坤中有五炁聚四時合於乾艮出天甲入戊己之内乃道生神之始人按天時相接天地之炁頭圓象天足方象地中理五炁聚而入於絳宫達於筋骨升而朝於鼎内復降湧泉入於中黄之宫混合萬神故青陽至首群陰皆散更用五行正炁内濟共一鼎煉成丹故不死矣乃施行於天也黄帝曰宇宙在乎手何也天眞皇人曰宇宙者天地也陰陽萬物之本受陰陽而成形陰者地炁陽者天炁天炁下降地炁受之地炁上騰天炁接之天炁地炁相交陰陽感契萬神生化成象上古聖人把握天地陰陽造化之元機機者在於用知者得而守也守者道也而不死也故曰宇宙在乎手也黄帝曰宇宙在乎手者如何用也廣成子曰天地交合宇宙不散内造化生神立陰陽神機則成大道大道者無爲也無爲則命不亂命不亂則神不移神不移則精不散精不散則氣不絶更以道氣通行而固身若運於精火相隨煅煉成金丹者乃自然也吾知宇宙之機運而連連行之合於天地之作勿令放也久而神自朝元故不死矣乃宇宙在乎手者也黄帝曰萬化生乎身者何謂也天眞皇人曰萬化者神也精不散而神不離神室者萬神聚會之鄉在崑崙之中五炁聚於内人能將眞精炁結成神胎朝於鼎上故曰至聖萬神皆聚而爲一凡人移精失炁而不能保神是不知生身之法生身之法陰陽之道故曰萬化生乎身也黄帝曰何者生身之法也廣成子曰從一炁所生而不知一炁之造化一生二二生三三生萬物人受一炁化成三炁神氣精此乃生身之法也黄帝曰一者何也天眞皇人曰一者天地之根陰陽之祖萬物之首乃生神也子能知眞一之炁而萬物自生則不死故曰一也黄帝曰天性人也人心機也何也廣成子曰天以斗運爲機人以心爲機心者神也神機合道乃鬼神不測人未生之時先受一炁爲命然後父母二炁相合故乃成形胎元生神故爲性之源人能澄心如天地動機故同天地乃因性靜心機合道故曰天性人也人心機也黄帝曰人心機者如何用也天眞皇人曰人心者機本也人能存心守神而不忘機用心者百神之元也安心者養性也是以聖人安其心而抱元含眞含眞者安性也以心爲性以炁爲命炁絶則命亡皆亂於性也失其氣故死矣若人如天炁澄清故不失於性也性不失則炁不散炁不散則命不亡命不亡則形不滅也天地者性命之本也故曰天性人也人心機也黄帝曰立天之道以定人也何也廣成子曰天道者清陽之炁也故以純陽爲本人能含造化純陽之體如天地之陽而不棄也人受一正之炁體養萬神純陽之理故曰立天之道以定人也黄帝曰立天之道如何用也天眞皇人曰天道者人之本也父母者人之始也人能留形於本而不失於始調神合道故曰立天之道也黄帝曰如何留形不失於始也廣成子曰人不憂愁思慮而不失其本去疾病勞苦而不失於始也失其本者自亡其命失其始者形還下土若人能心靜無慾而存神炁不失其始者知理也黄帝曰天發殺機移星易宿何也廣成子曰天之母者太易内藏陰陽二炁日月也日月未分聖化生神神名太一之首日月又分爲陰陽陰陽分其五太五太者五帝五帝又分八卦八卦朝於中聖化爲九宫乃是太一之神宫立其五斗内有中斗日月星奇北斗受機斡運陰陽陰爲機者死陽爲機者生陰陽合機爲之道太一將生殺之機周游八卦移星易宿返陰爲陽乃長生返陽爲陰殺者死也天之四時造化八卦循環人身中亦有爲人不知爲陰而殺乃死展轉輪迴失其人身人能致修者道也故曰天發殺機移星易宿也黄帝曰何謂不失人身殺機不死者何也天眞皇人曰太一鎮在九宫出入有時召太陽君回入陽殿四時移換八卦朝元萬神都聚殺陰返陽排列星辰歸其金闕之内聖境太清正陽白元君也若人知此天發殺機能將太一眞炁隨機應化返八卦純陽復歸乾坤之祖炁使合混沌九天生神之章乃爲天道永得長生依此造化爲眞人也故曰天發殺機移星易宿也黄帝曰地發殺機龍蛇起陸何也廣成子曰冲和一炁發者動也故天運不絶殺機者變化也龍者天炁也風也蛇者地炁也火也人能運精炁上下往來奪之造化故玄機若去六慾動於機權如天地之體人在其中有眞陽之精炁名曰蛇上通天元之炁呼吸而上下相應地動之機起而離陸故曰地發殺機龍蛇起陸也黄帝曰人身中知何用天眞皇人曰臍下一寸三分者氣海也中有眞精一合按於地土中有二經通於腦腦中有府名靈陽之府有二左曰太極之右曰冲靈之上通天炁下至海源故曰呼吸天炁下降地炁上騰二炁相接則養眞精名曰龍青陽之本下者爲蛇則元炁也二炁相交成藥乆煉成丹故不死也乃陽神超於身外乃人身中地發殺機龍蛇起陸也黄帝曰人發殺機天地返覆何也廣成子曰人發殺機者去六慾七情靜則靜於情意動則動於神機内用神炁上下相合守於神者陽氣也頭圓象天足方象地天地返覆乃陰陽升降人之返覆呼吸徹於蒂耳一吸天炁下降一呼地炁上升吸者天炁呼者地炁我之眞炁相接也人能下運地炁至天上故曰人發殺機天地返覆也黄帝曰天人合發萬變定基何也天眞皇人曰天生萬物人爲萬生一物之首也故天地相合而長養萬物人能用精炁相合而萬神皆喜天地故不棄而相逐神在其中神者乃天道也而好清若濁而神散不合天道上古聖人固精養神存炁養精合於天道乃爲眞人天有一炁地有二儀中有三光四時共備五行相列六合相生七政爲機八卦乃同九宫布滿天地五斗璇璣人亦有之人能受天地一炁相和諸神配合兩儀大丹乃成一炁上下無窮四時中有一炁播於中土五行顛倒内六陽上朝金闕七眞常居體内八卦共起元宫三光混混白雪飄飄七政功成黄芽内長九宫貫串萬象乃合天道故曰天人合發萬變定基也黄帝曰性有巧拙可以伏藏何也廣成子曰天性不可亂神炁若亂故不知所以神伏藏者性如朗月自然通道巧者内使天機外事不可入故伏智藏神也乃同天道拙者爲人不知自有神炁合道縱心信意生情一任散失神炁不明天地造化亂認陰陽故有死也乃性有巧拙也黄帝曰性有巧拙如何伏藏用也天眞皇人曰性者神也不可動也故神定炁和元炁自降伏者不貪嗜慕慾藏者藏於神光炁入絳宫萬神聚會之鄉伏藏而不動萬神不散故曰伏藏神定造化乆煉成道乃性巧不拙也黄帝曰九竅之邪在乎三要可以動靜何也廣成子曰九竅者心有九竅内藏九氣上者三清之炁中者三皇之炁下者本元之炁乃精炁神也出入有時混而爲一外通耳目口鼻陰中也三要者神氣與精相合玄化玉户上通於天下通於地中通三皇之祖炁乃三要之道也動靜耳目口鼻也目觀則心動耳聽則神移曰談則氣散鼻馥則精髓化爲陰濁之水若故令靜而不動則心中二竅左曰玄右曰牝下入氣海上通泥丸此眞炁相通故使神氣動機玉户自閉穿脊腠過三關而朝北極陽宫動而保養眞神上古聖人云動則動於神機靜則靜於心意精氣神是三要也故曰九竅之邪在乎三要也黄帝曰火生於木禍發必尅何也天眞皇人曰木去其火則不灰人去其惡性則不死木中有火火發必焚其眞炁乃成煙燄即上升而歸天火煅木爲灰爐而歸土凡人性惡爲火火出則神散神散則氣離氣離則身死眞陽之炁歸於天濁陰之質歸於土謂火從木生即以水救之即不灰人起火性以柔而救之即身不壞人之火發而萬神皆散故死也人能制火禍不能尅乃成大道故曰火生於木禍發必尅也黄帝曰姦生於國時動必潰何也廣成子曰國中有姦乆而破國身中有邪乆而亡身國去其姦則邦寧人去其情即身安去姦者六慾七情三尸也人能制姦邪者成其大道也故曰姦生於國時動必潰也黄帝曰如何得安身也天眞皇人曰萬物盗太虚眞炁人腹中有蠱盜萬物之炁而名虹蠱虹蠱者化爲佞蟲佞蟲者賊我之䰟魄亡我之神氣散我之精血死我之形也人能知陰陽造化起眞火煉陰邪之姦故殺虹蟲不令爲害故得身安返成大道也黄帝曰知之修煉謂之聖人何也廣成子曰上古聖人用神機測天地陰陽升降有時要知火候之數下火依時戊己宫内本始生神之母也知者復歸其母勿令放失更受天炁爲青陽之首合地炁眞陰之母我之神氣精在其中五炁皆全心靜無慾用火煅煉煉成純陽造化成道魄返陽魂情陰盡滅松形玉骨百關無漏上達於天界乃爲眞人也故曰知之脩煉謂之聖人也陰符經三皇玉訣卷上
