front:
  text: 陰符經三皇玉訣卷中下同卷餘一黄帝曰天生天殺道之理也天眞皇人曰天
  hash: sha256:47f1aae655d291ee3b055ceeb81a39c7ea602a7c3faadc12cc6ca0b242ae65b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0120_HFL_002-001a, image: hfl/0057/0057-042.png}
body:
  text: 生者人歸元道正發復升生也内合天作至道生眞遁隱在世其人能測聖機内明外通天地故知者不死也天殺者爲人不信天道任意損失精神炁故害物不過天數而死殺也故曰天生天殺道之理也黄帝曰天生天殺如何用也廣成子曰爲人修道不知天時歸根復始錯認根源故死也若人知天時眞炁歸根復命要知造化者乃有虚無眞源陰陽合一爲五行正炁也乾坤相勝要知進退乃無生死夫人道爲本若不知生殺者是謂補不足而損有餘道之理也故曰天生天殺也黄帝曰天地萬物之盗萬物人之盗人萬物之盜三盜既宜三才既安何也天眞皇人曰天以一炁而長養萬物天地炁散萬物盜之萬物炁散人以盜之人知盜萬物之眞炁養形更知升降順天時接天炁奪之造化長生不死乃人盜萬物之天炁故成道也人不曉造化者爲萬物復盜人之炁即因五穀而生即因五穀而死乃人被萬物復盜之而死也黄帝曰人盜萬物如何不死廣成子曰人受冲和之炁而生故不死也既禀受有情慾而死也若能存一炁故保神天以一炁而生萬物更與陰陽相和五穀共備人乃實腹强骨不失精炁神故不死也三盜既宜者人能盜天地萬物之炁以通神明與天地相宜三才以安人之精神與天地同而好清靜是以聖人恬淡虚無眞氣存元精神内守豈得死也故食飽者而傷於精血太勞者而散於神炁心起情慾者萬物豈得不盜之也故止飲食而身自輕止思慮而神自靈止嗜慾而神自清故乃得道也何勞外求故曰三盜既宜三才即安也黄帝曰故曰食其時百骸理何也天眞皇人曰上古聖人食天炁而有時自然百骸調暢引太和眞炁注於身田即五臟清凉六腑調泰關節自通精神以安也食時奪其造化乃成大道也故曰食其時百骸理也黄帝曰元炁通百關如何用也廣成子曰天炁柔弱穿筋透骨養神安精皆使關節通流豈不知理炁者人之本始也本始者天炁也故百姓日用而不知炁之升降陰陽往還有時受之一炁長養萬物若靈芝逢冬不死如人得道不死乃元炁通百脉關也黄帝曰動其機萬化安何也天眞皇人曰神機内用千變萬化自然成道故機者開其天關玉户自閉而火發天關鍊髓純陽乃火相從乆鍊而成丹故曰機也萬化者炁結成神朝歸於金關自然安神安身久而不死也機者密也人運機而化身無窮内外通神道合故曰動其機萬化安也黄帝曰人知其神而神不知不神而所以神何也廣成子曰人知外象有吉凶之兆即禱而信求其應不知自己身中有神外可通天地内可修鍊成道顯自己陽神通聖何勞外求因精生炁精者炁之母神者炁曰一者階於道幾於神用之在機顯之在世成之在君太宗謂靖曰讀千章萬句不如悟之一句蓋通於一萬事畢自古自今生天生地捨此何以哉夫旣得其母以知其子則推五行之循環觀四時之變通與墳所宗仙聖所宅凡知之所不能與思之所不能至自非極深而研幾者安能總其鉗轄撮其樞要而統宗元之會造妙徼之門也唯天下之至神然後能寓衆妙所寄見朝徹之獨而得其闔闢關鍵之原則有之以爲利无之以爲用不知其盡也一本哲字下續一百一十四字非也黄帝陰符經解義終所爲不知者亡精神散血氣焉得知也欲要知者靜心養性固氣保神靈而自知道也見其神也故曰天下莫能知莫能見也黄帝曰君子得之固窮小人得知輕命何也天眞皇人曰是以聖人窮於大道可通天地陰陽之理者固其命也聖人得知固其氣不失其精也精氣相合而生成大藥皆因知造化鍊神不散固氣通神也凡小人不知性命之本而不得保精神乃亡其身命故不守其神而婬於世乃失其精神輕其命而不自保故死也君子乆而行之可以固窮小人輕其命也常以輕神失命亡其身故曰君子得之固窮而小人輕命也黄帝曰瞽者善聽聾者善視何也廣成子曰視秋毫者不見泰山聽噍嘹者不聞雷霆善聽者非耳聰也察音聲者而自殺之善視者非目明也察色者而自殺之瞽者不見日月之光察聽陰陽交合乆而行道得長生也聾者不聞雷霆察通日月往還乆而行道得乆視也夫視者内見其機聽者内聞其聲此兩者合道也故曰瞽者善聽聾者善視也陰符經三皇玉訣卷中
